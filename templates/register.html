<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | PlacementGuide</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="login-page">

<div class="container-fluid">

<div class="row vh-100">

    <!-- LEFT -->

    <div class="col-lg-6 login-left d-flex flex-column justify-content-center">

        <div class="px-5">

            <h1 class="display-4 fw-bold">

                <i class="fa-solid fa-user-graduate text-white"></i>

                PlacementGuide

            </h1>

            <p class="lead mt-4">

                Create your free account and unlock AI-powered placement preparation.

            </p>

            <div class="mt-5">

                <h5><i class="fa-solid fa-circle-check text-warning"></i> AI Resume Analysis</h5>

                <h5><i class="fa-solid fa-circle-check text-warning"></i> ATS Score Report</h5>

                <h5><i class="fa-solid fa-circle-check text-warning"></i> Placement Prediction</h5>

                <h5><i class="fa-solid fa-circle-check text-warning"></i> Company Recommendation</h5>

                <h5><i class="fa-solid fa-circle-check text-warning"></i> Interview Preparation</h5>

            </div>

        </div>

    </div>

    <!-- RIGHT -->

    <div class="col-lg-6 d-flex justify-content-center align-items-center">

        <div class="login-card">

            <h2 class="fw-bold mb-4">

                Create Account

            </h2>

            <form method="POST">

                <!-- Full Name -->

                <div class="mb-3">

                    <label>Full Name</label>

                    <input
                        type="text"
                        class="form-control"
                        name="full_name"
                        placeholder="Enter your full name"
                        required>

                </div>

                <!-- Email -->

                <div class="mb-3">

                    <label>Email Address</label>

                    <input
                        type="email"
                        class="form-control"
                        name="email"
                        placeholder="Enter your email"
                        required>

                </div>

                <!-- Password -->

                <div class="mb-3">

                    <label>Password</label>

                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        placeholder="Create password"
                        required>

                </div>

                <!-- Confirm Password -->

                <div class="mb-3">

                    <label>Confirm Password</label>

                    <input
                        type="password"
                        class="form-control"
                        name="confirm_password"
                        placeholder="Confirm password"
                        required>

                </div>

                <!-- Branch -->

                <div class="mb-3">

                    <label>Branch</label>

                    <select
                        class="form-select"
                        name="branch"
                        required>

                        <option value="">Select Branch</option>

                        <option value="CSE">
                            Computer Science
                        </option>

                        <option value="ECE">
                            Electronics & Communication
                        </option>

                    </select>

                </div>

                <!-- College -->

                <div class="mb-4">

                    <label>College</label>

                    <input
                        type="text"
                        class="form-control"
                        name="college"
                        placeholder="Enter your college"
                        required>

                </div>

                <!-- Register Button -->

                <button
                    type="submit"
                    class="btn btn-primary w-100 login-btn">

                    Create Account

                </button>

                <p class="text-center mt-4">

                    Already have an account?

                    <a href="{{ url_for('login') }}">

                        Login

                    </a>

                </p>

            </form>

        </div>

    </div>

</div>

</div>

</body>

</html>
